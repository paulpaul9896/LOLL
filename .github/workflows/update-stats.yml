name: Update Hero Stats

on:
  schedule:
    # Daily at 09:00 UTC (after CN API refresh)
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Fetch wrstats data
        run: npm run update-stats

      - name: Commit and push if changed
        run: |
          if git diff --quiet src/data/stats.ts; then
            echo "No changes to hero stats."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/stats.ts
          git commit -m "$(cat <<'EOF'
chore: update hero stats from wrstats.online

EOF
)"
          git push
